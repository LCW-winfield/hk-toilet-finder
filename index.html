<!DOCTYPE html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HK Toilet Finder</title>
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <div class="brand-header">
            <div>
              <p class="eyebrow" data-i18n="eyebrow">Hong Kong Public Toilets</p>
              <h1 data-i18n="brandTitle">香港搵公廁</h1>
            </div>
            <button id="languageToggle" class="ghost-btn language-btn" type="button">EN</button>
          </div>
          <p class="intro" data-i18n="intro">
            即時查看附近公廁、自動推薦最近路線，並用清晰標籤快速判斷是否適合使用。
          </p>
        </div>

        <section class="panel controls-panel">
          <button id="locateBtn" class="primary-btn" data-i18n="locateBtn">查找最近公廁</button>
          <button id="resetBtn" class="ghost-btn" data-i18n="resetBtn">重設路線</button>

          <div class="filter-group">
            <label>
              <input type="checkbox" id="accessibleOnly" />
              <span data-i18n="accessibleOnly">只看無障礙</span>
            </label>
            <label>
              <input type="checkbox" id="babyCareOnly" />
              <span data-i18n="babyCareOnly">只看母嬰友善</span>
            </label>
            <label for="minScore" data-i18n="minScoreLabel">最低整潔度</label>
            <input id="minScore" type="range" min="0" max="5" step="0.5" value="0" />
            <span id="minScoreValue">0.0</span>
          </div>
        </section>

        <section class="panel result-panel">
          <div class="panel-header">
            <h2 data-i18n="recommendationTitle">推薦結果</h2>
            <span id="routeMeta">未開始導航</span>
          </div>
          <div id="selectedToilet" class="selected-card empty-state">
            點地圖上的公廁，或點擊「查找最近公廁」。
          </div>
        </section>

        <section class="panel list-panel">
          <div class="panel-header">
            <h2 data-i18n="nearbyTitle">附近公廁</h2>
            <span id="listCount"></span>
          </div>
          <div id="toiletList" class="toilet-list"></div>
        </section>
      </aside>

      <main class="map-layout map-only-layout">
        <div id="map"></div>
      </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="./app.js"></script>
  </body>
</html>
